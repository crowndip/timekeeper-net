name: Build Release Packages

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    
    - name: Extract version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
    
    - name: Build Linux Client (x64)
      run: |
        cd src/ParentalControl.Client
        dotnet publish -c Release -r linux-x64 --self-contained -o ../../publish/client-linux-x64
    
    - name: Build Linux Client (arm64)
      run: |
        cd src/ParentalControl.Client
        dotnet publish -c Release -r linux-arm64 --self-contained -o ../../publish/client-linux-arm64
    
    - name: Build Windows Client (x64)
      run: |
        cd src/ParentalControl.Client.Windows
        dotnet publish -c Release -r win-x64 --self-contained -o ../../publish/client-windows-x64 /p:EnableWindowsTargeting=true
    
    - name: Build Windows Tray Icon
      run: |
        cd src/ParentalControl.TrayIcon.Windows
        dotnet publish -c Release -r win-x64 --self-contained -o ../../publish/tray-windows-x64 /p:EnableWindowsTargeting=true
    
    - name: Build Server
      run: |
        cd src/ParentalControl.WebService
        dotnet publish -c Release -o ../../publish/server
    
    - name: Package Linux Client (x64)
      run: |
        cd publish
        tar -czf client-linux-x64.tar.gz -C client-linux-x64 .
    
    - name: Package Linux Client (arm64)
      run: |
        cd publish
        tar -czf client-linux-arm64.tar.gz -C client-linux-arm64 .
    
    - name: Package Windows Client (x64)
      run: |
        cd publish
        zip -r client-windows-x64.zip client-windows-x64
    
    - name: Package Windows Tray Icon
      run: |
        cd publish
        zip -r tray-windows-x64.zip tray-windows-x64
    
    - name: Package Server
      run: |
        cd publish
        tar -czf server.tar.gz -C server .
    
    - name: Build .deb package
      run: |
        cd scripts
        chmod +x build-deb.sh
        ./build-deb.sh ${{ steps.version.outputs.VERSION }}
    
    - name: Build Tray Icon .deb package
      run: |
        cd scripts
        chmod +x build-tray-deb.sh
        ./build-tray-deb.sh ${{ steps.version.outputs.VERSION }}
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          publish/client-linux-x64.tar.gz
          publish/client-linux-arm64.tar.gz
          publish/client-windows-x64.zip
          publish/tray-windows-x64.zip
          publish/server.tar.gz
          build/client-deb/parental-control-client_*.deb
          build/tray-deb/parental-control-tray_*.deb
        draft: false
        prerelease: false
        body: |
          ## Release ${{ steps.version.outputs.VERSION }}
          
          ### Downloads
          
          **Server**:
          - `server.tar.gz` - ASP.NET Core web service + Blazor UI
          
          **Linux Client**:
          - `client-linux-x64.tar.gz` - Linux x64 client
          - `client-linux-arm64.tar.gz` - Linux ARM64 client (Raspberry Pi)
          - `parental-control-client_${{ steps.version.outputs.VERSION }}_amd64.deb` - Ubuntu/Debian package
          
          **Linux Tray Icon** (Optional):
          - `parental-control-tray_${{ steps.version.outputs.VERSION }}_amd64.deb` - System tray icon showing remaining time
          
          **Windows Client**:
          - `client-windows-x64.zip` - Windows x64 client
          
          **Windows Tray Icon** (Optional):
          - `tray-windows-x64.zip` - System tray icon showing remaining time
          
          ---
          
          ### Quick Start
          
          #### Server Deployment
          
          **Option 1: Automatic (Portainer)**
          
          Use Portainer Stack with this docker-compose.yml:
          
          ```yaml
          version: '3.8'
          services:
            db:
              image: postgres:16
              environment:
                POSTGRES_DB: parentalcontrol
                POSTGRES_USER: pcuser
                POSTGRES_PASSWORD: ${DB_PASSWORD}
              volumes:
                - pgdata:/var/lib/postgresql/data
              restart: unless-stopped
          
            server:
              image: ghcr.io/crowndip/timekeeper-net:${{ steps.version.outputs.VERSION }}
              ports:
                - "8080:8080"
              environment:
                ConnectionStrings__DefaultConnection: "Host=db;Database=parentalcontrol;Username=pcuser;Password=${DB_PASSWORD}"
                AdminPassword: ${ADMIN_PASSWORD}
                LimitAdministratorPassword: ${LIMIT_ADMIN_PASSWORD}
              depends_on:
                - db
              restart: unless-stopped
          
          volumes:
            pgdata:
          ```
          
          Set environment variables in Portainer:
          - `ADMIN_PASSWORD` - Dashboard login password
          - `LIMIT_ADMIN_PASSWORD` - Admin operations password
          - `DB_PASSWORD` - Database password
          
          **Option 2: Manual (Docker Compose)**
          
          ```bash
          # Set passwords
          export ADMIN_PASSWORD=your_dashboard_password
          export LIMIT_ADMIN_PASSWORD=your_admin_password
          export DB_PASSWORD=your_db_password
          
          # Start server
          docker-compose up -d
          
          # Access dashboard at http://localhost:8080
          ```
          
          #### Linux Client (.deb package)
          ```bash
          # Install
          sudo dpkg -i parental-control-client_${{ steps.version.outputs.VERSION }}_amd64.deb
          
          # Configure server URL
          sudo nano /opt/parental-control/appsettings.json
          # Set "ServerUrl": "http://your-server-ip:8080"
          
          # Start service
          sudo systemctl start parental-control-client
          
          # Check status
          sudo systemctl status parental-control-client
          ```
          
          #### Linux Client (automatic script)
          ```bash
          curl -fsSL https://raw.githubusercontent.com/crowndip/timekeeper-net/main/scripts/install-linux-client.sh | sudo bash -s -- http://your-server-ip:8080
          ```
          
          #### Windows Client
          ```powershell
          # Extract client-windows-x64.zip
          # Run install-windows-client.ps1 as Administrator
          .\install-windows-client.ps1 -ServerUrl "http://your-server-ip:8080"
          ```
          
          ---
          
          ### Reverse Proxy with Basic Authentication
          
          If your server is behind a reverse proxy with basic authentication (e.g., Nginx, Traefik):
          
          **Linux Client:**
          ```bash
          # Set server URL (without credentials)
          sudo /opt/parental-control/ParentalControl.Client set server-url https://tracking.yourdomain.com
          
          # Configure basic auth
          sudo tee /opt/parental-control/appsettings.json > /dev/null <<EOF
          {
            "ParentalControl": {
              "ReverseProxy": {
                "Enabled": true,
                "Username": "your_username",
                "Password": "your_password"
              }
            }
          }
          EOF
          
          # Restart service
          sudo systemctl restart parental-control-client
          ```
          
          **Windows Client:**
          ```powershell
          # Set server URL (without credentials)
          & "C:\Program Files\ParentalControl\ParentalControl.Client.Windows.exe" set server-url https://tracking.yourdomain.com
          
          # Configure basic auth
          $config = @"
          {
            "ParentalControl": {
              "ReverseProxy": {
                "Enabled": true,
                "Username": "your_username",
                "Password": "your_password"
              }
            }
          }
          "@
          $config | Out-File -FilePath "C:\ProgramData\ParentalControl\appsettings.json" -Encoding UTF8
          
          # Restart service
          Restart-Service ParentalControlClient
          ```
          
          **Note:** Both client and tray applications use the same configuration file.
          
          ---
          
          ### Documentation
          
          - [Installation Guide](https://github.com/crowndip/timekeeper-net/blob/main/INSTALLATION.md)
          - [Quick Start](https://github.com/crowndip/timekeeper-net/blob/main/QUICKSTART.md)
          - [Features](https://github.com/crowndip/timekeeper-net/blob/main/FEATURES.md)
          - [Windows Client Guide](https://github.com/crowndip/timekeeper-net/blob/main/WINDOWS_CLIENT.md)
