name: Build and Release

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --no-restore --configuration Release
    
    - name: Test
      run: dotnet test --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=test-results.trx"
    
    - name: Publish Test Results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always()
      continue-on-error: true
      with:
        files: '**/test-results.trx'
    
    - name: Build Docker Image
      run: |
        docker build -f docker/Dockerfile.webservice -t parental-control-webservice:${{ github.sha }} .
        docker save parental-control-webservice:${{ github.sha }} -o webservice-image.tar
    
    - name: Publish WebService
      run: dotnet publish src/ParentalControl.WebService/ParentalControl.WebService.csproj -c Release -o publish/webservice
    
    - name: Publish Client (Linux x64)
      run: dotnet publish src/ParentalControl.Client/ParentalControl.Client.csproj -c Release -r linux-x64 --self-contained -o publish/client-linux-x64
    
    - name: Publish Client UI (Linux x64)
      run: dotnet publish src/ParentalControl.Client.UI/ParentalControl.Client.UI.csproj -c Release -r linux-x64 --self-contained -o publish/client-ui-linux-x64
    
    - name: Build .deb Package
      run: |
        VERSION="1.0.0"
        ARCH="amd64"
        PKG_NAME="parental-control-client"
        PKG_DIR="deb-package/${PKG_NAME}_${VERSION}_${ARCH}"
        
        # Create package structure
        mkdir -p ${PKG_DIR}/DEBIAN
        mkdir -p ${PKG_DIR}/opt/parental-control/bin
        mkdir -p ${PKG_DIR}/opt/parental-control/ui
        mkdir -p ${PKG_DIR}/etc/systemd/system
        
        # Copy binaries
        cp -r publish/client-linux-x64/* ${PKG_DIR}/opt/parental-control/bin/
        cp -r publish/client-ui-linux-x64/* ${PKG_DIR}/opt/parental-control/ui/
        
        # Copy systemd service
        cp scripts/parental-control-client.service ${PKG_DIR}/etc/systemd/system/
        
        # Copy config template
        cp src/ParentalControl.Client/appsettings.json ${PKG_DIR}/opt/parental-control/appsettings.json
        
        # Create control file
        cat > ${PKG_DIR}/DEBIAN/control << EOF
        Package: ${PKG_NAME}
        Version: ${VERSION}
        Section: admin
        Priority: optional
        Architecture: ${ARCH}
        Depends: systemd, libicu74 | libicu72 | libicu70
        Maintainer: Parental Control Team <support@example.com>
        Description: Parental Control Client Agent
         Centralized parental control system client for Linux.
         Tracks computer usage time and enforces time limits.
         Features:
          - Time tracking and enforcement
          - Offline mode support
          - Cross-platform notification UI
          - systemd integration
        Homepage: https://github.com/crowndip/timekeeper-net
        EOF
        
        # Create postinst script
        cat > ${PKG_DIR}/DEBIAN/postinst << 'EOF'
        #!/bin/bash
        set -e
        
        # Reload systemd
        systemctl daemon-reload
        
        # Enable service (but don't start - user needs to configure first)
        systemctl enable parental-control-client.service
        
        echo ""
        echo "Parental Control Client installed successfully!"
        echo ""
        echo "Next steps:"
        echo "1. Edit /opt/parental-control/appsettings.json"
        echo "2. Set your server URL"
        echo "3. Start service: sudo systemctl start parental-control-client"
        echo ""
        
        exit 0
        EOF
        
        # Create prerm script
        cat > ${PKG_DIR}/DEBIAN/prerm << 'EOF'
        #!/bin/bash
        set -e
        
        # Stop service if running
        systemctl stop parental-control-client.service || true
        systemctl disable parental-control-client.service || true
        
        exit 0
        EOF
        
        chmod 755 ${PKG_DIR}/DEBIAN/postinst
        chmod 755 ${PKG_DIR}/DEBIAN/prerm
        
        # Build package
        dpkg-deb --build ${PKG_DIR}
        
        # Move to artifacts
        mv deb-package/${PKG_NAME}_${VERSION}_${ARCH}.deb artifacts/
    
    - name: Create Deployment Package
      run: |
        mkdir -p artifacts/server
        mkdir -p artifacts/client
        
        # Server artifacts for Portainer
        cp docker-compose.yml artifacts/server/
        cp docker/init.sql artifacts/server/
        cp webservice-image.tar artifacts/server/
        cp README.md artifacts/server/
        cp PORTAINER_DEPLOYMENT.md artifacts/server/
        
        # Client artifacts
        cp -r publish/client-linux-x64/* artifacts/client/
        cp -r publish/client-ui-linux-x64 artifacts/client/ui
        cp scripts/install-client.sh artifacts/client/
        cp scripts/parental-control-client.service artifacts/client/
        cp src/ParentalControl.Client/appsettings.json artifacts/client/appsettings.json.example
        
        # Create archives
        cd artifacts/server && tar -czf ../server-deployment.tar.gz * && cd ../..
        cd artifacts/client && tar -czf ../client-linux-x64.tar.gz * && cd ../..
    
    - name: Upload Server Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: server-deployment
        path: artifacts/server-deployment.tar.gz
        retention-days: 90
    
    - name: Upload Client Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: client-linux-x64
        path: artifacts/client-linux-x64.tar.gz
        retention-days: 90
    
    - name: Upload .deb Package
      uses: actions/upload-artifact@v4
      with:
        name: debian-package
        path: artifacts/parental-control-client_*.deb
        retention-days: 90
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/server-deployment.tar.gz
          artifacts/client-linux-x64.tar.gz
          artifacts/parental-control-client_*.deb
        body: |
          ## Server Deployment (Portainer)
          Download `server-deployment.tar.gz` and extract:
          - `docker-compose.yml` - Portainer stack configuration
          - `init.sql` - Database initialization
          - `webservice-image.tar` - Docker image (load with `docker load -i webservice-image.tar`)
          
          ## Client Installation (Ubuntu/Debian)
          **Recommended**: Download `.deb` package:
          ```bash
          sudo dpkg -i parental-control-client_1.0.0_amd64.deb
          sudo nano /opt/parental-control/appsettings.json  # Configure server URL
          sudo systemctl start parental-control-client
          ```
          
          ## Client Installation (Other Linux)
          Download `client-linux-x64.tar.gz` and extract:
          - Run `sudo ./install-client.sh` to install
          - Edit `/opt/parental-control/appsettings.json` with your server URL
          - Start with `sudo systemctl start parental-control-client`
