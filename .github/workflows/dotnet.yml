name: Build and Release

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      checks: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: |
        dotnet restore src/ParentalControl.Shared/ParentalControl.Shared.csproj
        dotnet restore src/ParentalControl.WebService/ParentalControl.WebService.csproj
        dotnet restore src/ParentalControl.Client/ParentalControl.Client.csproj
        dotnet restore src/ParentalControl.Client.UI/ParentalControl.Client.UI.csproj
        dotnet restore src/ParentalControl.Client.Windows/ParentalControl.Client.Windows.csproj
        dotnet restore tests/ParentalControl.WebService.Tests/ParentalControl.WebService.Tests.csproj
        dotnet restore tests/ParentalControl.Client.Tests/ParentalControl.Client.Tests.csproj
        dotnet restore tests/ParentalControl.Client.Windows.Tests/ParentalControl.Client.Windows.Tests.csproj
    
    - name: Build
      run: |
        dotnet build src/ParentalControl.Shared/ParentalControl.Shared.csproj --no-restore --configuration Release
        dotnet build src/ParentalControl.WebService/ParentalControl.WebService.csproj --no-restore --configuration Release
        dotnet build src/ParentalControl.Client/ParentalControl.Client.csproj --no-restore --configuration Release
        dotnet build src/ParentalControl.Client.UI/ParentalControl.Client.UI.csproj --no-restore --configuration Release
        dotnet build src/ParentalControl.Client.Windows/ParentalControl.Client.Windows.csproj --no-restore --configuration Release
        dotnet build tests/ParentalControl.WebService.Tests/ParentalControl.WebService.Tests.csproj --no-restore --configuration Release
        dotnet build tests/ParentalControl.Client.Tests/ParentalControl.Client.Tests.csproj --no-restore --configuration Release
        dotnet build tests/ParentalControl.Client.Windows.Tests/ParentalControl.Client.Windows.Tests.csproj --no-restore --configuration Release
    
    - name: Test
      run: |
        dotnet test tests/ParentalControl.WebService.Tests/ParentalControl.WebService.Tests.csproj --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=test-results.trx"
        dotnet test tests/ParentalControl.Client.Tests/ParentalControl.Client.Tests.csproj --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=test-results.trx"
        dotnet test tests/ParentalControl.Client.Windows.Tests/ParentalControl.Client.Windows.Tests.csproj --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=test-results.trx"
    
    - name: Publish Test Results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always()
      continue-on-error: true
      with:
        files: '**/test-results.trx'
    
    - name: Build Docker Image
      run: |
        docker build -f docker/Dockerfile.webservice -t parental-control-webservice:${{ github.sha }} .
        docker save parental-control-webservice:${{ github.sha }} -o webservice-image.tar
    
    - name: Publish WebService
      run: dotnet publish src/ParentalControl.WebService/ParentalControl.WebService.csproj -c Release -o publish/webservice
    
    - name: Publish Client (Linux x64)
      run: dotnet publish src/ParentalControl.Client/ParentalControl.Client.csproj -c Release -r linux-x64 --self-contained -o publish/client-linux-x64
    
    - name: Publish Client UI (Linux x64)
      run: dotnet publish src/ParentalControl.Client.UI/ParentalControl.Client.UI.csproj -c Release -r linux-x64 --self-contained -o publish/client-ui-linux-x64
    
    - name: Publish Windows Client
      run: dotnet publish src/ParentalControl.Client.Windows/ParentalControl.Client.Windows.csproj -c Release -r win-x64 --self-contained -o publish/client-windows-x64
    
    - name: Publish Windows Client UI
      run: dotnet publish src/ParentalControl.Client.Windows.UI/ParentalControl.Client.Windows.UI.csproj -c Release -r win-x64 --self-contained -o publish/client-ui-windows-x64 || echo "WPF UI build skipped on Linux"
    
    - name: Create Deployment Package
      run: |
        mkdir -p artifacts/server
        mkdir -p artifacts/client
        
        # Server artifacts for Portainer
        cp docker-compose.yml artifacts/server/
        cp docker/init.sql artifacts/server/
        cp webservice-image.tar artifacts/server/
        cp README.md artifacts/server/
        cp PORTAINER_DEPLOYMENT.md artifacts/server/
        
        # Linux client artifacts
        cp -r publish/client-linux-x64/* artifacts/client/
        cp -r publish/client-ui-linux-x64 artifacts/client/ui
        cp scripts/install-client.sh artifacts/client/
        cp scripts/parental-control-client.service artifacts/client/
        cp src/ParentalControl.Client/appsettings.json artifacts/client/appsettings.json.example
        
        # Windows client artifacts
        mkdir -p artifacts/client-windows
        cp -r publish/client-windows-x64/* artifacts/client-windows/
        if [ -d "publish/client-ui-windows-x64" ]; then
          cp -r publish/client-ui-windows-x64 artifacts/client-windows/ui
        fi
        cp scripts/install-windows-client.ps1 artifacts/client-windows/
        cp scripts/uninstall-windows-client.ps1 artifacts/client-windows/
        cp src/ParentalControl.Client.Windows/appsettings.json artifacts/client-windows/appsettings.json.example
        cp WINDOWS_CLIENT.md artifacts/client-windows/
        
        # Create archives
        cd artifacts/server && tar -czf ../webservice-image.tar.gz * && cd ../..
        cd artifacts/client && tar -czf ../client-linux-x64.tar.gz * && cd ../..
        cd artifacts/client-windows && zip -r ../client-windows-x64.zip * && cd ../..
    
    - name: Upload Server Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: webservice-image
        path: artifacts/webservice-image.tar.gz
        retention-days: 90
    
    - name: Upload Client Artifacts (Linux)
      uses: actions/upload-artifact@v4
      with:
        name: client-linux-x64
        path: artifacts/client-linux-x64.tar.gz
        retention-days: 90
    
    - name: Upload Client Artifacts (Windows)
      uses: actions/upload-artifact@v4
      with:
        name: client-windows-x64
        path: artifacts/client-windows-x64.zip
        retention-days: 90
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/webservice-image.tar.gz
          artifacts/docker-compose.yml
          artifacts/deploy-server.sh
          artifacts/client-linux-x64.tar.gz
          artifacts/client-windows-x64.zip
        body: |
          ## 🚀 Server Deployment (Portainer)
          
          ### Option 1: Automated Deployment (Recommended)
          
          Download and run the automated deployment script:
          
          ```bash
          # Download the script
          wget https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/deploy-server.sh
          
          # Make it executable
          chmod +x deploy-server.sh
          
          # Run with sudo
          sudo ./deploy-server.sh
          ```
          
          The script will:
          - ✅ Download the latest Docker image
          - ✅ Extract and load it into Docker
          - ✅ Tag it as 'latest'
          - ✅ Verify the installation
          - ✅ Clean up temporary files
          
          Then simply **reload your Portainer stack** to use the new image!
          
          ### Option 2: Manual Deployment
          
          **First Time Setup:**
          
          1. **Copy `docker-compose.yml`** from this release page
          2. **Create new stack in Portainer** (name it "parental-control")
          3. **Paste the docker-compose.yml content**
          4. **Set environment variable:** `DB_PASSWORD=your_secure_password`
          5. **Deploy the stack**
          6. **Run the deployment script** (see Option 1 above)
          7. **Reload the stack in Portainer**
          8. **Visit** `http://localhost:8080/setup` to initialize the database
          
          **Updating Existing Installation:**
          
          ```bash
          # Download and extract
          wget https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/webservice-image.tar.gz
          tar -xzf webservice-image.tar.gz
          
          # Load and tag
          docker load -i webservice-image.tar
          docker tag parental-control-webservice:<hash> parental-control-webservice:latest
          
          # Reload stack in Portainer
          ```
          
          **Note:** Database initialization is handled through the web UI at `/setup` - no SQL scripts needed!
          
          ## Linux Client Installation
          
          Download `client-linux-x64.tar.gz` and extract:
          ```bash
          tar -xzf client-linux-x64.tar.gz
          cd client-linux-x64
          sudo ./install-client.sh
          sudo nano /opt/parental-control/appsettings.json  # Configure server URL
          sudo systemctl start parental-control-client
          ```
          
          ## Windows Client Installation
          
          Download `client-windows-x64.zip` and extract:
          ```powershell
          # Open PowerShell as Administrator
          .\install-windows-client.ps1 -ServerUrl "http://your-server-ip:8080"
          
          # Check service status
          Get-Service ParentalControlClient
          ```
          
          **See [WINDOWS_CLIENT.md](https://github.com/crowndip/timekeeper-net/blob/main/WINDOWS_CLIENT.md) for detailed Windows installation.**
          
          ## What's New in v1.1.1
          
          ### Critical Fix
          - ✅ Server no longer crashes on uninitialized database
          - ✅ Home page checks database status before queries
          - ✅ Automatic redirect to /setup if database not initialized
          - ✅ Clean error handling with no unhandled exceptions
          
          ### Improvements
          - Created Index.razor with database status check
          - Safe navigation flow with automatic redirects
          - User-friendly setup experience
          
          ### Bug Fixed
          - Fixed "relation 'Users' does not exist" error on fresh deployment
          - Fixed server crash when accessing home page before initialization
          
          ## Documentation
          
          - [PORTAINER_DEPLOYMENT.md](https://github.com/crowndip/timekeeper-net/blob/main/PORTAINER_DEPLOYMENT.md) - Complete server deployment guide
          - [WINDOWS_CLIENT.md](https://github.com/crowndip/timekeeper-net/blob/main/WINDOWS_CLIENT.md) - Windows client installation
          - [REVERSE_PROXY.md](https://github.com/crowndip/timekeeper-net/blob/main/REVERSE_PROXY.md) - Reverse proxy setup
          - [ERROR_SCENARIOS.md](https://github.com/crowndip/timekeeper-net/blob/main/ERROR_SCENARIOS.md) - Troubleshooting guide
